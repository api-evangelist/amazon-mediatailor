        - name: nextToken
          in: query
          type: string
          required: false
          description: <p>(Optional) If the playback configuration has more than <code>MaxResults</code> channel schedules,
            use <code>NextToken</code> to get the second and subsequent pages of results.</p> <p>For the first <code>GetChannelScheduleRequest</code>
            request, omit this value.</p> <p>For the second and subsequent requests, get the value of <code>NextToken</code>
            from the previous response and specify that value for <code>NextToken</code> in the request.</p> <p>If the previous
            response didn't include a <code>NextToken</code> element, there are no more channel schedules to get.</p>
