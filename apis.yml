aid: amazon-mediatailor
name: Amazon MediaTailor
description: >-
  AWS Elemental MediaTailor lets video providers insert individually targeted
  advertising into their video streams without sacrificing broadcast-level
  quality-of-service. It offers server-side ad insertion and replaces
  traditional client-side ad insertion, providing more reliable ad delivery.
